<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo - 2D Print</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    main {
      max-width: 900px;
      margin: 80px auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      color: #6a0dad;
      margin-bottom: 20px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background: #6a0dad;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #520a9e;
    }
    .produto {
      border: 1px solid #ddd;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
    }
    header {
      background: #6a0dad;
      color: #fff;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .logo img {
      height: 40px;
    }
    header nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      font-weight: bold;
    }
    header nav a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Cabeçalho padrão do site -->
  <header>
    <div class="logo">
      <img src="img/logo.png" alt="2D Print">
    </div>
    <nav>
      <a href="index.html">Início</a>
      <a href="login.html" onclick="logout()">Sair</a>
    </nav>
  </header>

  <main>
    <h2>Cadastrar Produto</h2>
    <form id="formProduto">
      <input type="text" id="nome" placeholder="Nome do produto" required>
      <textarea id="descricao" placeholder="Descrição" required></textarea>
      <input type="text" id="imagem" placeholder="URL da imagem">
      <input type="number" id="preco" placeholder="Preço" required>
      <input type="number" id="quantidade_minima" placeholder="Quantidade mínima" required>
      <button type="submit">Cadastrar Produto</button>
    </form>

    <h2>Produtos Ativos</h2>
    <div id="listaProdutos"></div>
  </main>

  <script>
    // Verifica login
    if (!sessionStorage.getItem('logado')) {
      window.location.href = 'login.html';
    }

    function logout() {
      sessionStorage.removeItem('logado');
    }

    // Cadastrar produto
    document.getElementById('formProduto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const produto = {
        nome: nome.value,
        descricao: descricao.value,
        imagem: imagem.value,
        preco: parseFloat(preco.value),
        quantidade_minima: parseInt(quantidade_minima.value),
        ativo: 1
      };
      await fetch('/api/produtos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(produto)
      });
      carregarProdutos();
      e.target.reset();
    });

    // Carregar produtos
    async function carregarProdutos() {
      const res = await fetch('/api/produtos');
      const produtos = await res.json();
      const lista = document.getElementById('listaProdutos');
      lista.innerHTML = produtos.map(p => `
        <div class="produto">
          <h3>${p.nome}</h3>
          <p>${p.descricao}</p>
          <p><b>Preço:</b> R$ ${p.preco.toFixed(2)}</p>
          <p><b>Qtd mínima:</b> ${p.quantidade_minima}</p>
          <button onclick="alterarStatus(${p.id}, 0)">Desativar</button>
        </div>
      `).join('');
    }

    // Alterar status
    async function alterarStatus(id, ativo) {
      await fetch('/api/produtos/' + id + '/status', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ativo })
      });
      carregarProdutos();
    }

    carregarProdutos();
  </script>
</body>
</html>
